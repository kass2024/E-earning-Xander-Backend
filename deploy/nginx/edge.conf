# Edge reverse proxy — Apache on the host forwards 80/443 here (127.0.0.1:8090)
# Does NOT touch /var/www Apache projects.

upstream parrot_frontend {
    server frontend:80;
}

upstream parrot_backend {
    server backend:80;
}

server {
    listen 80;
    server_name xanderglobalacademy.com www.xanderglobalacademy.com;

    location / {
        proxy_pass http://parrot_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.xanderglobalacademy.com;

    client_max_body_size 100M;

    location / {
        proxy_pass http://parrot_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
    }
}
