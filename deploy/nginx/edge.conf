# Edge reverse proxy — Apache on the host forwards 80/443 here (127.0.0.1:8090)
# Does NOT touch /var/www Apache projects.
#
# IMPORTANT: use Docker DNS (127.0.0.11) + variables for upstreams so recreating
# frontend/backend containers never leaves a stale IP (which causes 502).

server_names_hash_bucket_size 128;

gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_vary on;
gzip_proxied any;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

server {
    listen 80;
    server_name xanderglobalacademy.com www.xanderglobalacademy.com;

    # Docker embedded DNS — re-resolve service names frequently
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $parrot_frontend_upstream frontend:80;

    location / {
        proxy_pass http://$parrot_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffers 16 32k;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name api.xanderglobalacademy.com;

    client_max_body_size 100M;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $parrot_backend_upstream backend:80;

    location / {
        proxy_pass http://$parrot_backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 600;
    }
}
